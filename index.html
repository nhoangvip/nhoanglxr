<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>UCHIHA PANEL V2 | Sharingan Optimization</title>
  <!-- Font Awesome 6 cho icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ========== BACKGROUND UCHIHA EFFECT ========== */
    .uchiha-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 20%, #2d0000, #0a0a0a 80%);
      z-index: -2;
    }

    .sharingan-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.08"><circle cx="50" cy="50" r="40" fill="none" stroke="%23ff1a1a" stroke-width="1.5"/><circle cx="50" cy="50" r="25" fill="none" stroke="%23ff1a1a" stroke-width="1"/><circle cx="50" cy="50" r="8" fill="%23ff1a1a"/><path d="M50 10 L50 25 M50 75 L50 90 M10 50 L25 50 M75 50 L90 50" stroke="%23ff1a1a" stroke-width="1.5"/></svg>');
      background-size: 180px 180px;
      pointer-events: none;
      z-index: -1;
    }

    /* ========== CONTAINER CHÍNH ========== */
    #app {
      width: 100%;
      max-width: 1300px;
      margin: 20px;
      display: none;
    }

    /* ========== LOGIN PAGE ========== */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: rgba(20, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 60, 60, 0.3);
      border-radius: 32px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 30px 50px rgba(255, 0, 0, 0.2), 0 0 80px rgba(180, 0, 0, 0.3);
      text-align: center;
      transition: all 0.3s ease;
    }

    .uchiha-logo {
      font-size: 4rem;
      color: #ff3131;
      text-shadow: 0 0 25px #ff0000, 0 0 10px #aa0000;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .uchiha-logo i {
      font-size: 3.5rem;
    }

    .login-card h2 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 15px crimson;
    }

    .login-card p {
      color: #b0b0b0;
      margin-bottom: 2rem;
      font-style: italic;
    }

    .key-input-group {
      position: relative;
      margin: 25px 0;
    }

    .key-input-group input {
      width: 100%;
      padding: 1rem 1.2rem;
      background: #1a0000;
      border: 2px solid #5a0000;
      border-radius: 50px;
      color: white;
      font-size: 1.1rem;
      outline: none;
      transition: 0.3s;
      text-align: center;
      letter-spacing: 2px;
    }

    .key-input-group input:focus {
      border-color: #ff3131;
      box-shadow: 0 0 25px #ff0000aa;
      background: #250000;
    }
        .btn-login {
      background: linear-gradient(135deg, #b30000, #ff1a1a);
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      box-shadow: 0 10px 25px rgba(255, 0, 0, 0.5);
      text-transform: uppercase;
      margin-top: 10px;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #ff1a1a, #ff4d4d);
      box-shadow: 0 15px 35px #ff0000cc;
      transform: translateY(-2px);
    }

    .error-message {
      color: #ff5e5e;
      margin-top: 1rem;
      font-weight: 500;
      display: none;
      background: rgba(255,0,0,0.15);
      padding: 8px 15px;
      border-radius: 20px;
    }

    /* ========== PANEL CHÍNH ========== */
    .panel-layout {
      display: flex;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(12, 0, 0, 0.7);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 80, 80, 0.25);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }

    /* SIDEBAR */
    .sidebar {
      width: 270px;
      background: rgba(20, 0, 0, 0.8);
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #5a1a1a;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 2rem;
      border-bottom: 1px solid #4a1010;
      margin-bottom: 1.5rem;
    }

    .sidebar-header i {
      font-size: 2.2rem;
      color: #ff3a3a;
    }

    .sidebar-header span {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .nav-menu {
      list-style: none;
      flex: 1;
    }

    .nav-item {
      padding: 0.9rem 1.2rem;
      margin-bottom: 0.5rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      transition: 0.2s;
      color: #ccc;
    }

    .nav-item i {
      width: 22px;
      font-size: 1.2rem;
    }

    .nav-item:hover {
      background: #3a0000;
      color: white;
    }

    .nav-item.active {
      background: #b30000;
      color: white;
      box-shadow: 0 8px 20px rgba(200,0,0,0.5);
    }

    .logout-btn {
      margin-top: auto;
      background: transparent;
      border: 1px solid #ff4d4d;
      color: #ff4d4d;
      padding: 0.8rem;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background: #ff4d4d;
      color: black;
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.3);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(30, 0, 0, 0.7);
      border: 1px solid #b33b3b;
      border-radius: 20px;
      padding: 1.3rem;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: #ff4d4d;
      box-shadow: 0 15px 30px rgba(255,0,0,0.3);
    }

    .card-title {
      font-size: 0.9rem;
      color: #aaaaaa;
      margin-bottom: 0.6rem;
    }

    .card-value {
      font-size: 2rem;
      font-weight: 700;
      color: #ff5e5e;
    }

    .optimize-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }.optimize-item {
      background: rgba(18, 0, 0, 0.8);
      border: 1px solid #6b1a1a;
      border-radius: 18px;
      padding: 1.5rem;
      transition: 0.3s;
    }

    .optimize-item:hover {
      border-color: #ff2a2a;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .item-header i {
      font-size: 1.6rem;
      color: #ff5e5e;
    }

    .toggle-switch {
      position: relative;
      width: 52px;
      height: 28px;
      display: inline-block;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3a0000;
      transition: .3s;
      border-radius: 34px;
      border: 1px solid #a53f3f;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #ff1a1a;
      box-shadow: 0 0 15px #ff0000;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .range-slider {
      width: 100%;
      margin: 12px 0;
      accent-color: #ff3131;
      background: #2c0000;
      height: 6px;
      border-radius: 5px;
    }

    .status-badge {
      font-size: 0.8rem;
      background: #2a0000;
      padding: 4px 12px;
      border-radius: 20px;
      color: #ffaaaa;
    }

    .btn-auto {
      background: #b30000;
      border: none;
      color: white;
      padding: 0.9rem 2rem;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 1.5rem;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      letter-spacing: 1px;
    }
    .btn-auto:hover {
      background: #ff2626;
      box-shadow: 0 0 30px red;
    }

    /* ADMIN PAGE */
    .admin-section {
      display: none;
    }

    .admin-section.active {
      display: block;
    }

    .key-generator {
      background: #1a0000;
      padding: 1.8rem;
      border-radius: 20px;
      margin-bottom: 2rem;
    }

    .key-list {
      background: #140000;
      border-radius: 16px;
      padding: 1rem;
      max-height: 350px;
      overflow-y: auto;
    }

    .key-item {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem;
      border-bottom: 1px solid #4a2020;
    }

    @media (max-width: 768px) {
      .panel-layout {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
<div class="uchiha-bg"></div>
<div class="sharingan-pattern"></div>

<!-- LOGIN VIEW -->
<div id="loginView" class="login-container">
  <div class="login-card">
    <div class="uchiha-logo">
      <i class="fas fa-fire"></i>
      <i class="fas fa-eye" style="color:#ff4d4d;"></i>
    </div>
    <h2>UCHIHA PANEL V2</h2>
    <p>「 うちは 」· Nhập Key để thức tỉnh Sharingan</p>
    <div class="key-input-group">
      <input type="text" id="keyInput" placeholder="Nhập Key..." autocomplete="off">
    </div>
    <button class="btn-login" id="loginBtn"><i class="fas fa-sign-in-alt"></i> KÍCH HOẠT</button>
    <div id="loginError" class="error-message"></div>
    <p style="margin-top:1.2rem; font-size:0.8rem; color:#777;">Key Admin NGUYEN HOANG CẤP</p>
  </div>
</div>

<!-- PANEL CHÍNH -->
<div id="panelView" class="panel-layout" style="display: none;">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-skull"></i>
      <span>UCHIHA</span>
    </div>
    <ul class="nav-menu">
      <li class="nav-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
      <li class="nav-item" data-page="optimize"><i class="fas fa-cogs"></i> Tối ưu</li>
      <li class="nav-item" id="adminNavItem" data-page="admin" style="display: none;"><i class="fas fa-user-shield"></i> Admin Key</li>
    </ul>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-power-off"></i> Đăng xuất</button>
  </div>

  <!-- MAIN -->
  <div class="main-content">
    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage" class="page active">
      <h2 style="margin-bottom:1.5rem;"><i class="fas fa-chart-line"></i> Tổng quan</h2>
      <div class="dashboard-cards">
        <div class="stat-card"><div class="card-title">FPS Hiện tại</div><div class="card-value" id="fpsValue">144</div></div>
        <div class="stat-card"><div class="card-title">Trạng thái</div><div class="card-value" style="color:#4caf50;">ACTIVE</div></div>
        <div class="stat-card"><div class="card-title">Key</div><div class="card-value" id="keyDisplay" style="font-size:1.2rem;">---</div></div>
      </div>
    </div>
    <!-- OPTIMIZE PAGE -->
    <div id="optimizePage" class="page" style="display: none;">
      <h2 style="margin-bottom:1.5rem;"><i class="fas fa-sliders-h"></i> Bộ tối ưu</h2>
      <div class="optimize-grid" id="optimizeContainer"></div>
      <button class="btn-auto" id="autoOptimizeBtn"><i class="fas fa-magic"></i> AUTO OPTIMIZE</button>
    </div>

    <!-- ADMIN PAGE (chỉ admin thấy) -->
    <div id="adminPage" class="page admin-section" style="display: none;">
      <h2><i class="fas fa-key"></i> Quản lý Key</h2>
      <div class="key-generator">
        <input type="text" id="newKeyInput" placeholder="Key (để trống tự sinh)" style="padding:0.7rem; width:60%; background:#2a0000; border:1px solid #b33b3b; color:white; border-radius:8px;">
        <select id="expireSelect" style="padding:0.7rem; background:#2a0000; color:white; border:1px solid #b33b3b; border-radius:8px; margin-left:10px;">
          <option value="7">7 ngày</option>
          <option value="30">30 ngày</option>
          <option value="1">1 ngày (test)</option>
        </select>
        <button id="generateKeyBtn" style="margin-left:10px; background:#b30000; border:none; color:white; padding:0.7rem 1.5rem; border-radius:8px;"><i class="fas fa-plus"></i> Tạo Key</button>
      </div>
      <div class="key-list" id="keyListContainer"></div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- CONST ----------
    const ADMIN_KEY = "nhoang123";
    const STORAGE_KEYS = "uchiha_keys_v2";
    const STORAGE_CURRENT = "uchiha_current_key";

    // Cấu hình tính năng tối ưu
    const optimizeFeatures = [
      { id: "fixLag", name: "Fix Lag / Tối ưu FPS", icon: "fa-bolt" },
      { id: "pointSpeed", name: "Tăng Point Speed", icon: "fa-mouse-pointer" },
      { id: "sensitivity", name: "Tăng Sensitivity", icon: "fa-arrow-pointer" },
      { id: "inputLag", name: "Giảm Input Lag", icon: "fa-keyboard" },
      { id: "ramCpu", name: "Tối ưu RAM & CPU", icon: "fa-microchip" },
      { id: "clearCache", name: "Clear Cache", icon: "fa-broom" },
      { id: "boostGame", name: "Boost Game Performance", icon: "fa-gamepad" }
    ];

    // State
    let currentUserKey = "";
    let isAdmin = false;

    // DOM
    const loginView = document.getElementById("loginView");
    const panelView = document.getElementById("panelView");
    const loginBtn = document.getElementById("loginBtn");
    const keyInput = document.getElementById("keyInput");
    const loginError = document.getElementById("loginError");
    const logoutBtn = document.getElementById("logoutBtn");
    const adminNavItem = document.getElementById("adminNavItem");
    const navItems = document.querySelectorAll(".nav-item");
    const pages = {
      dashboard: document.getElementById("dashboardPage"),
      optimize: document.getElementById("optimizePage"),
      admin: document.getElementById("adminPage")
    };
    const keyDisplay = document.getElementById("keyDisplay");
    const fpsValue = document.getElementById("fpsValue");

    // ========== HÀM QUẢN LÝ KEY ==========
    function getKeysFromStorage() {
      const data = localStorage.getItem(STORAGE_KEYS);
      return data ? JSON.parse(data) : [];
    }

    function saveKeysToStorage(keys) {
      localStorage.setItem(STORAGE_KEYS, JSON.stringify(keys));
    }
        // Tạo key admin mặc định nếu chưa có
    function initDefaultKeys() {
      let keys = getKeysFromStorage();
      if (!keys.find(k => k.key === ADMIN_KEY)) {
        keys.push({
          key: ADMIN_KEY,
          expiredate: "2099-12-31", // vĩnh viễn
          status: "Active",
          created: new Date().toISOString()
        });
        saveKeysToStorage(keys);
      }
    }

    // Kiểm tra key hợp lệ
    function validateKey(inputKey) {
      const keys = getKeysFromStorage();
      const found = keys.find(k => k.key === inputKey);
      if (!found) return { valid: false, reason: "Key không tồn tại." };
      if (found.status === "Expired" || new Date(found.expiredate) < new Date()) {
        // tự động update status nếu hết hạn
        if (found.status !== "Expired") {
          found.status = "Expired";
          saveKeysToStorage(keys);
        }
        return { valid: false, reason: "Key đã hết hạn." };
      }
      return { valid: true, keyData: found };
    }
        // Đăng nhập
    function login(key) {
      const result = validateKey(key);
      if (!result.valid) {
        loginError.style.display = "block";
        loginError.textContent = result.reason;
        return;
      }
      currentUserKey = key;
      isAdmin = (key === ADMIN_KEY);
      localStorage.setItem(STORAGE_CURRENT, key);
      showPanel();
    }

    function logout() {
      currentUserKey = "";
      isAdmin = false;
      localStorage.removeItem(STORAGE_CURRENT);
      loginView.style.display = "flex";
      panelView.style.display = "none";
      keyInput.value = "";
      loginError.style.display = "none";
    }

    function showPanel() {
      loginView.style.display = "none";
      panelView.style.display = "flex";
      keyDisplay.textContent = currentUserKey;
      if (isAdmin) {
        adminNavItem.style.display = "flex";
      } else {
        adminNavItem.style.display = "none";
      }
      // Mặc định active dashboard
      switchPage("dashboard");
      renderOptimizeFeatures();
      if (isAdmin) renderKeyList();
      // Random FPS
      fpsValue.textContent = Math.floor(Math.random() * 60 + 120);
    }

    // Chuyển trang
    function switchPage(pageName) {
      Object.values(pages).forEach(p => p.style.display = "none");
      if (pages[pageName]) pages[pageName].style.display = "block";
      navItems.forEach(item => {
        if (item.dataset.page === pageName) item.classList.add("active");
        else item.classList.remove("active");
      });
    }

    // ========== TỐI ƯU FEATURES ==========
    function renderOptimizeFeatures() {
      const container = document.getElementById("optimizeContainer");
      if (!container) return;
      container.innerHTML = "";
      optimizeFeatures.forEach(feat => {
        const saved = localStorage.getItem(`uchiha_opt_${feat.id}`);
        const checked = saved === "true" ? "checked" : "";
        const percent = localStorage.getItem(`uchiha_opt_${feat.id}_val`) || 75;
        const div = document.createElement("div");
        div.className = "optimize-item";
        div.innerHTML = `
          <div class="item-header">
            <i class="fas ${feat.icon}"></i>
            <label class="toggle-switch">
              <input type="checkbox" class="opt-toggle" data-id="${feat.id}" ${checked}>
              <span class="slider"></span>
            </label>
          </div>
          <strong>${feat.name}</strong>
          <input type="range" class="range-slider opt-range" data-id="${feat.id}" min="0" max="100" value="${percent}">
          <div><span class="status-badge" id="status_${feat.id}">${checked ? 'ON' : 'OFF'} · ${percent}%</span></div>
        `;
        container.appendChild(div);
      });

      // Gán sự kiện
      document.querySelectorAll(".opt-toggle").forEach(toggle => {
        toggle.addEventListener("change", function() {
          const id = this.dataset.id;
          localStorage.setItem(`uchiha_opt_${id}`, this.checked);
          updateStatusBadge(id);
        });
      });
      document.querySelectorAll(".opt-range").forEach(range => {
        range.addEventListener("input", function() {
          const id = this.dataset.id;
          localStorage.setItem(`uchiha_opt_${id}_val`, this.value);
          updateStatusBadge(id);
        });
      });
    }

    function updateStatusBadge(id) {
      const toggle = document.querySelector(`.opt-toggle[data-id="${id}"]`);
      const range = document.querySelector(`.opt-range[data-id="${id}"]`);
      const badge = document.getElementById(`status_${id}`);
      if (badge && toggle && range) {
        badge.textContent = `${toggle.checked ? 'ON' : 'OFF'} · ${range.value}%`;
      }
    }

    document.getElementById("autoOptimizeBtn")?.addEventListener("click", () => {
      document.querySelectorAll(".opt-toggle").forEach(t => {
        t.checked = true;
        localStorage.setItem(`uchiha_opt_${t.dataset.id}`, "true");
      });
      document.querySelectorAll(".opt-range").forEach(r => {
        r.value = 95;
        localStorage.setItem(`uchiha_opt_${r.dataset.id}_val`, "95");
      });
      optimizeFeatures.forEach(f => updateStatusBadge(f.id));
      alert("🔥 AUTO OPTIMIZE: Tất cả đã được kích hoạt ở mức 95%");
    });

    // ========== ADMIN KEY ==========
    function generateRandomKey() {
      return 'uchiha-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    function renderKeyList() {
      const container = document.getElementById("keyListContainer");
      if (!container) return;
      const keys = getKeysFromStorage();
      container.innerHTML = keys.map(k => {
        const expDate = new Date(k.expiredate);
        const isExpired = expDate < new Date() || k.status === "Expired";
        return `<div class="key-item">
          <span><strong>${k.key}</strong> (Hết hạn: ${k.expiredate})</span>
          <span style="color:${isExpired?'#ff4d4d':'#4caf50'}">${isExpired?'Expired':'Active'}</span>
        </div>`;
      }).join("");
    }

    document.getElementById("generateKeyBtn")?.addEventListener("click", () => {
      if (!isAdmin) return;
      let newKey = document.getElementById("newKeyInput").value.trim();
      if (!newKey) newKey = generateRandomKey();
      const days = parseInt(document.getElementById("expireSelect").value);
      const expDate = new Date();
      expDate.setDate(expDate.getDate() + days);
      const keys = getKeysFromStorage();
      if (keys.find(k => k.key === newKey)) {
        alert("Key đã tồn tại!");
        return;
      }
      keys.push({
        key: newKey,
        expiredate: expDate.toISOString().split('T')[0],
        status: "Active",
        created: new Date().toISOString()
      });
      saveKeysToStorage(keys);
      renderKeyList();
      document.getElementById("newKeyInput").value = "";
      alert(`✅ Đã tạo key: ${newKey}`);
    });

    // ========== EVENT LISTENERS ==========
    loginBtn.addEventListener("click", () => {
      const key = keyInput.value.trim();
      if (!key) {
        loginError.style.display = "block";
        loginError.textContent = "Vui lòng nhập key.";
        return;
      }
      login(key);
    });

    keyInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });

    logoutBtn.addEventListener("click", logout);

    navItems.forEach(item => {
      item.addEventListener("click", (e) => {
        const page = item.dataset.page;
        if (page === "admin" && !isAdmin) {
          alert("Chỉ admin mới truy cập.");
          return;
        }
        switchPage(page);
        if (page === "admin") renderKeyList();
      });
    });

    // Kiểm tra phiên đăng nhập trước đó
    window.addEventListener("load", () => {
      initDefaultKeys();
      const savedKey = localStorage.getItem(STORAGE_CURRENT);
      if (savedKey) {
        const validation = validateKey(savedKey);
        if (validation.valid) {
          currentUserKey = savedKey;
          isAdmin = (savedKey === ADMIN_KEY);
          showPanel();
        } else {
          localStorage.removeItem(STORAGE_CURRENT);
          logout();
        }
      } else {
        loginView.style.display = "flex";
      }
    });

  })();
</script>
</body>
</html>
